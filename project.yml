name: Praisabot
options:
  bundleIdPrefix: org.savoba
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  DEVELOPMENT_TEAM: TBCJC928A5
  CODE_SIGN_STYLE: Automatic
targets:
  Praisabot:
    type: application
    platform: iOS
    sources:
      - path: Praisabot
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.savoba.Praisabot
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UIRequiresFullScreen: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      MARKETING_VERSION: "0.1.0"
      CURRENT_PROJECT_VERSION: 1
    info:
      path: Praisabot/Info.plist
      properties:
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - org.savoba.Praisabot.sendPraise
    entitlements:
      path: Praisabot/Praisabot.entitlements
  PraisabotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PraisabotTests
    dependencies:
      - target: Praisabot
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.savoba.PraisabotTests
      GENERATE_INFOPLIST_FILE: true
