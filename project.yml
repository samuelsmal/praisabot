name: Praisabot
options:
  bundleIdPrefix: org.savoba
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  DEVELOPMENT_TEAM: TBCJC928A5
  CODE_SIGN_STYLE: Automatic
targets:
  Praisabot:
    type: application
    platform: iOS
    sources:
      - path: Praisabot
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.savoba.Praisabot
      MARKETING_VERSION: "0.4.0"
      CURRENT_PROJECT_VERSION: 1
    info:
      path: Praisabot/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - org.savoba.Praisabot.sendPraise
    entitlements:
      path: Praisabot/Praisabot.entitlements
    preBuildScripts:
      - script: cp "${PROJECT_DIR}/CHANGELOG.md" "${PROJECT_DIR}/Praisabot/Resources/CHANGELOG.md"
        name: Copy Changelog
        inputFiles:
          - $(PROJECT_DIR)/CHANGELOG.md
        outputFiles:
          - $(PROJECT_DIR)/Praisabot/Resources/CHANGELOG.md
  PraisabotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PraisabotTests
    dependencies:
      - target: Praisabot
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.savoba.PraisabotTests
      GENERATE_INFOPLIST_FILE: true
